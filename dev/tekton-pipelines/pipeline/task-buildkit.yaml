apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: buildkit
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/categories: Image Build
    tekton.dev/tags: image-build
    tekton.dev/displayName: "BuildKit"
    tekton.dev/platforms: "linux/amd64"
spec:
  description: >-
    This Task builds and pushes an image using Moby BuildKit.
  params:
    - name: IMAGE
      description: Reference of the image buildkit will produce.
    - name: BUILDER_IMAGE
      description: The location of the buildkit builder image.
      default: harbor.clusters.zjusct.io/docker.io/moby/buildkit:latest
    - name: DOCKERFILE
      description: Path to the Dockerfile to build.
      default: ./Dockerfile
    - name: CONTEXT
      description: The build context used by BuildKit.
      default: .
    - name: BUILDKIT_CLIENT_IMAGE
      description: The location of the buildkit client image.
      default: harbor.clusters.zjusct.io/docker.io/moby/buildkit:latest
  workspaces:
    - name: source
      description: Holds the context and Dockerfile
    - name: dockerconfig
      description: Includes a docker `config.json`
      optional: true
      mountPath: /root/.docker
  results:
    - name: IMAGE_DIGEST
      description: Digest of the image just built.
    - name: IMAGE_URL
      description: URL of the image just built.
  steps:
    - name: build-and-push
      image: $(params.BUILDKIT_CLIENT_IMAGE)
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e

        # Build and push using buildctl
        buildctl \
          --addr tcp://buildkitd.buildkit.svc.cluster.local:1234 \
          build \
          --frontend dockerfile.v0 \
          --local context=$(params.CONTEXT) \
          --local dockerfile=$(dirname $(params.DOCKERFILE)) \
          --output type=image,name=$(params.IMAGE),push=true \
          --export-cache type=inline \
          --import-cache type=registry,ref=$(params.IMAGE)

        # Note: BuildKit doesn't easily expose digest, so we'll use the image reference
        echo -n "$(params.IMAGE)" | tee $(results.IMAGE_URL.path)
        echo -n "$(params.IMAGE)@sha256:unknown" | tee $(results.IMAGE_DIGEST.path)
      securityContext:
        runAsUser: 0
