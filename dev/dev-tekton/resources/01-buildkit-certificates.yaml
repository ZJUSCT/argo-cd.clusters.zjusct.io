---
# Self-signed issuer for creating CA
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: buildkit-selfsigned-issuer
  namespace: dev-tekton
spec:
  selfSigned: {}
---
# CA Certificate for BuildKit
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: buildkit-ca
  namespace: dev-tekton
spec:
  commonName: buildkit-ca
  isCA: true
  issuerRef:
    kind: Issuer
    name: buildkit-selfsigned-issuer
  secretName: buildkit-ca-secret
  privateKey:
    algorithm: RSA
    size: 4096
---
# CA Issuer using the CA certificate
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: buildkit-ca-issuer
  namespace: dev-tekton
spec:
  ca:
    secretName: buildkit-ca-secret
---
# Server Certificate for BuildKit Daemon
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: buildkit-daemon-cert
  namespace: dev-tekton
spec:
  commonName: buildkitd
  dnsNames:
    - buildkitd
    - buildkitd.dev-tekton
    - buildkitd.dev-tekton.svc
    - buildkitd.dev-tekton.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: buildkit-ca-issuer
  secretName: buildkit-daemon-certs
  privateKey:
    algorithm: RSA
    size: 4096
  usages:
    - server auth
---
# Client Certificate for BuildKit Client (buildctl)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: buildkit-client-cert
  namespace: dev-tekton
spec:
  commonName: buildkit-client
  issuerRef:
    kind: Issuer
    name: buildkit-ca-issuer
  secretName: buildkit-client-certs
  privateKey:
    algorithm: RSA
    size: 4096
  usages:
    - client auth
