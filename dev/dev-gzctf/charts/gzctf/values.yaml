# Default values for GZCTF Helm Chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  # Namespace selector for the challenge namespace
  # This is where CTF challenges will be deployed
  challengeNamespace: gzctf-challenges

# GZCTF application configuration
gzctf:
  # Number of replicas for the main application
  replicaCount: 1

  image:
    # for chinese user, add registry.cn-shanghai.aliyuncs.com/
    repository: gztime/gzctf
    pullPolicy: Always
    tag: develop

  # Service configuration
  service:
    type: ClusterIP
    httpPort: 8080
    metricsPort: 3000
    annotations: {}
      # Example: Enable session affinity with Traefik
      # traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
      # traefik.ingress.kubernetes.io/service.sticky.cookie.name: "LB_Session"
      # traefik.ingress.kubernetes.io/service.sticky.cookie.httponly: "true"

  # Resource limits and requests
  resources:
    requests:
      cpu: 1000m
      memory: 384Mi
    # limits:
    #   cpu: 2000m
    #   memory: 1Gi

  # Environment variables
  env:
    - name: LC_ALL
      value: "zh_CN.UTF-8"
    - name: TZ
      value: "Asia/Shanghai"

  # Persistent storage for files
  persistence:
    enabled: true
    # Specify your storage class name (e.g., "local-path", "nfs-client", "standard")
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 4Gi
    # Optional: specify a PV name to bind to
    # volumeName: gzctf-files-pv
    # Optional: use hostPath for testing (not recommended for production)
    # hostPath:
    #   path: /store/gzctf/current/files
    #   type: DirectoryOrCreate

  # GZCTF application configuration (appsettings.json)
  config:
    allowedHosts: "*"

    # Database connection
    database:
      # Host will be auto-generated as <release-name>-postgresql:5432
      # You can override it here if using external database
      # host: external-postgres:5432
      name: ctf
      username: postgres
      # Password for PostgreSQL - CHANGE THIS!
      password: "CHANGE_ME_DATABASE_PASSWORD"

    # Redis cache connection
    redis:
      # Host will be auto-generated as <release-name>-garnet:6379
      # You can override it here if using external Redis
      # host: external-redis:6379
      abortConnect: false

    # Logging configuration
    logging:
      logLevel:
        default: Warning
        microsoft: Warning
        microsoftAspNetCoreHttpOverrides: Debug

    # XOR key for encryption - CHANGE THIS!
    xorKey: "CHANGE_ME_RANDOM_STRING"

    # Email configuration
    email:
      senderAddress: "noreply@example.com"
      userName: "noreply@example.com"
      # Email password - CHANGE THIS!
      password: "CHANGE_ME_EMAIL_PASSWORD"
      smtp:
        host: smtp.example.com
        port: 587

    # Container provider configuration
    containerProvider:
      type: Kubernetes
      portMappingType: PlatformProxy
      enableTrafficCapture: true
      # Public entry for the platform - CHANGE THIS to your domain!
      publicEntry: "internal.example.com"

    # Request logging
    requestLogging: false

    # Rate limiting
    disableRateLimit: false

    # CAPTCHA configuration (Cloudflare Turnstile)
    captcha:
      provider: "None" # or "CloudflareTrunstile" or "HashPow"
      # Site key - CHANGE THIS!
      siteKey: "CHANGE_ME_SITE_KEY"
      # Secret key - CHANGE THIS!
      secretKey: "CHANGE_ME_SECRET_KEY"

    # Container registries credentials
    registries: {}
      # ghcr.io:
      #   userName: "your-username"
      #   password: "ghp_your-token"

    # Forwarded headers configuration (for reverse proxy)
    forwardedOptions:
      forwardedHeaders: 15
      forwardLimit: 3
      # Trusted networks (add your ingress controller's network CIDR)
      trustedNetworks: []
        # Example for common Kubernetes networks:
        # - "10.42.0.0/16"    # K3s default pod network
        # - "10.244.0.0/16"   # Flannel default
        # - "192.168.0.0/16"  # Common private network
        #
        # Example for Cloudflare proxy (if using Cloudflare):
        # - "173.245.48.0/20"
        # - "103.21.244.0/22"
        # - "103.22.200.0/22"
        # - "103.31.4.0/22"
        # - "141.101.64.0/18"
        # - "108.162.192.0/18"
        # - "190.93.240.0/20"
        # - "188.114.96.0/20"
        # - "197.234.240.0/22"
        # - "198.41.128.0/17"
        # - "162.158.0.0/15"
        # - "104.16.0.0/13"
        # - "104.24.0.0/14"
        # - "172.64.0.0/13"
        # - "131.0.72.0/22"

    # Telemetry configuration
    telemetry:
      enable: true
      prometheus:
        enable: true
      openTelemetry:
        enable: false
        protocol: Grpc
        endpointUri: ""

    # Kestrel configuration
    kestrel:
      limits:
        maxResponseBufferSize: 2048
        maxRequestBufferSize: 1048576
        maxRequestLineSize: 8192
        maxRequestHeadersTotalSize: 32768
        maxRequestHeaderCount: 100
        maxRequestBodySize: 134217728

# PostgreSQL configuration
postgresql:
  enabled: true

  image:
    repository: postgres
    pullPolicy: Always
    tag: alpine

  # PostgreSQL password - should match gzctf.config.database.password
  # This will be set via environment variable POSTGRES_PASSWORD
  auth:
    # Password is taken from gzctf.config.database.password
    postgresPassword: ""  # Will be auto-filled from gzctf.config.database.password

  # Service configuration
  service:
    type: ClusterIP
    port: 5432

  # Resource limits and requests
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    # limits:
    #   cpu: 1000m
    #   memory: 1Gi

  # Persistent storage for database
  persistence:
    enabled: true
    # Specify your storage class name (e.g., "local-path", "nfs-client", "standard")
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    # Optional: specify a PV name to bind to
    # volumeName: gzctf-db-pv
    # Optional: use hostPath for testing (not recommended for production)
    # hostPath:
    #   path: /store/gzctf/current/db
    #   type: DirectoryOrCreate

# Garnet (Redis-compatible cache) configuration
garnet:
  enabled: true

  image:
    repository: ghcr.io/microsoft/garnet-alpine
    pullPolicy: Always
    tag: latest

  # Service configuration
  service:
    type: ClusterIP
    port: 6379

  # Resource limits and requests
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    # limits:
    #   cpu: 100m
    #   memory: 128Mi

# Ingress configuration
ingress:
  enabled: false
  # Specify your ingress class name (e.g., "nginx", "traefik", "alb")
  className: ""
  annotations: {}
    # Example for nginx-ingress:
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    #
    # Example for Traefik:
    # traefik.ingress.kubernetes.io/router.tls: "true"
    # ingress.kubernetes.io/force-ssl-redirect: "true"

  # Multiple hosts configuration
  # Each host can have multiple paths
  hosts:
    - host: ctf.example.com
      paths:
        - path: /
          pathType: Prefix

  # TLS configuration
  tls: []
    # - secretName: ctf-tls
    #   hosts:
    #     - ctf.example.com

# HTTPRoute configuration (Gateway API)
# Gateway API is the next-generation traffic management API for Kubernetes
# Requires Gateway API CRDs to be installed: https://gateway-api.sigs.k8s.io/
httpRoute:
  enabled: false
  annotations: {}

  # Reference to Gateway(s) that this HTTPRoute should attach to
  parentRefs:
    - name: gateway
      namespace: default
      # Optional: specify a section name for a specific listener
      # sectionName: https

  # Hostnames for HTTP request matching
  hostnames:
    - ctf.example.com

  # Advanced routing rules (optional)
  # If not specified, a default rule routing all traffic to GZCTF service will be created
  rules: []
    # Example: Path-based routing
    # - matches:
    #     - path:
    #         type: PathPrefix
    #         value: /
    #   backendRefs:
    #     - name: gzctf  # Will be auto-generated as release-name-gzctf
    #       port: 8080
    #
    # Example: Header-based routing
    # - matches:
    #     - path:
    #         type: PathPrefix
    #         value: /api
    #       headers:
    #         - name: version
    #           value: v2
    #   backendRefs:
    #     - name: gzctf
    #       port: 8080
    #
    # Example: Request header modification
    # - matches:
    #     - path:
    #         type: PathPrefix
    #         value: /
    #   filters:
    #     - type: RequestHeaderModifier
    #       requestHeaderModifier:
    #         set:
    #           - name: X-Forwarded-Proto
    #             value: https
    #   backendRefs:
    #     - name: gzctf
    #       port: 8080

# ServiceAccount configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  # If not set and create is true, a name is generated using the fullname template
  name: ""

  # RBAC configuration
  rbac:
    # Create ClusterRoleBinding for GZCTF to manage Kubernetes resources
    create: true
    # ClusterRole to bind to (GZCTF needs cluster-admin to manage challenge pods)
    clusterRole: cluster-admin

# ServiceMonitor configuration (for Prometheus Operator)
serviceMonitor:
  enabled: false
  # Additional labels for ServiceMonitor (e.g., for prometheus operator selector)
  labels: {}
    # Example for kube-prometheus-stack:
    # release: kube-prometheus
  # Metrics path
  path: /metrics
  # Scrape interval
  interval: 30s

# Pod annotations (useful for automatic reload)
podAnnotations:
  # secret.reloader.stakater.com/reload: "gzctf-kubeconfig"
  # configmap.reloader.stakater.com/reload: "gzctf-config"

# Pod labels
podLabels: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# Security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Node selector for all pods
nodeSelector: {}
  # kubernetes.io/hostname: gzctf

# Tolerations for all pods
tolerations: []

# Affinity for all pods
affinity: {}

# Image pull secrets
imagePullSecrets: []

# Name overrides
nameOverride: ""
fullnameOverride: ""

# Strategy for deployment updates
strategy:
  type: RollingUpdate

# Autoscaling configuration (disabled by default for GZCTF)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
