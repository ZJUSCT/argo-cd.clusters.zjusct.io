{{- if .Values.gzctf.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "gzctf.fullname" . }}-files
  labels:
    {{- include "gzctf.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  accessModes:
    {{- toYaml .Values.gzctf.persistence.accessModes | nindent 4 }}
  {{- if .Values.gzctf.persistence.storageClassName }}
  storageClassName: {{ .Values.gzctf.persistence.storageClassName }}
  {{- end }}
  {{- if .Values.gzctf.persistence.volumeName }}
  volumeName: {{ .Values.gzctf.persistence.volumeName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.gzctf.persistence.size }}
{{- end }}
---
{{- if and .Values.postgresql.enabled .Values.postgresql.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "gzctf.fullname" . }}-db
  labels:
    {{- include "gzctf.postgresql.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.postgresql.persistence.accessModes | nindent 4 }}
  {{- if .Values.postgresql.persistence.storageClassName }}
  storageClassName: {{ .Values.postgresql.persistence.storageClassName }}
  {{- end }}
  {{- if .Values.postgresql.persistence.volumeName }}
  volumeName: {{ .Values.postgresql.persistence.volumeName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgresql.persistence.size }}
{{- end }}
