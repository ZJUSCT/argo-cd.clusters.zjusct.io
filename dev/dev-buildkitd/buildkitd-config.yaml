apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-config
  namespace: dev-buildkitd
data:
  buildkitd.toml: |
    debug = true

    # Allow HTTP registries (internal Harbor core service)
    # Must specify port 80 explicitly to force HTTP protocol
    [registry."harbor-core.default.svc.cluster.local:80"]
      http = true
