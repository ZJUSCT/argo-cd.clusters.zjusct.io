apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-config
  namespace: dev-buildkitd
data:
  buildkitd.toml: |
    debug = true

    # Allow HTTP registries (internal Harbor core service)
    # Using both http=true and insecure=true enables httpFallback transport
    # which handles HTTPS->HTTP fallback for token authentication
    [registry."harbor-core.default.svc.cluster.local"]
      http = true
      insecure = true
