apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: clone-build-push
  namespace: tekton-pipelines
spec:
  description: |
    This pipeline clones a git repo, builds a Docker image with BuildKit and
    pushes it to a registry
  params:
    - name: repo-url
      type: string
      description: The git repository URL to clone from.
    - name: image-reference
      type: string
      description: The image reference to build and push (e.g., registry/image:tag)
    - name: dockerfile
      type: string
      description: Path to the Dockerfile
      default: ./Dockerfile
  workspaces:
    - name: shared-data
      description: Workspace for sharing data between tasks
    - name: docker-credentials
      description: Docker config.json for authentication
  tasks:
    - name: fetch-source
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-data
      params:
        - name: url
          value: $(params.repo-url)
    - name: build-push
      runAfter: ["fetch-source"]
      taskRef:
        name: buildkit
      workspaces:
        - name: source
          workspace: shared-data
        - name: dockerconfig
          workspace: docker-credentials
      params:
        - name: IMAGE
          value: $(params.image-reference)
        - name: DOCKERFILE
          value: $(params.dockerfile)
  results:
    - name: IMAGE_URL
      description: URL of the built image
      value: $(tasks.build-push.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      description: Digest of the built image
      value: $(tasks.build-push.results.IMAGE_DIGEST)
