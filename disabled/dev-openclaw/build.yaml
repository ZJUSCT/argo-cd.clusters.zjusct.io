# Build configuration for OpenClaw custom image
# This file is used by Jenkins to build custom images with plugins pre-installed

build:
  # Base image to extend
  baseImage: harbor.clusters.zjusct.io/ghcr.io/openclaw/openclaw
  baseTag: "2026.2.9"

  # Target image configuration
  targetImage: harbor.clusters.zjusct.io/dev/openclaw

  # Plugins to install
  plugins:
    - "@sliverp/qqbot@latest"

  # Build context
  context: ./build
  dockerfile: Dockerfile

  # Build arguments
  buildArgs:
    OPENCLAW_VERSION: "2026.2.9"
