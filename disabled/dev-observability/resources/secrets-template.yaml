# Template for creating SealedSecret
# Use kubeseal to encrypt this file before committing
#
# Example:
# kubectl create secret generic otelcol-secrets \
#   --from-literal=bearer-token='YOUR_TOKEN' \
#   --from-literal=snmp-auth-key='YOUR_AUTH_KEY' \
#   --from-literal=snmp-private-key='YOUR_PRIVATE_KEY' \
#   --dry-run=client -o yaml | \
#   kubeseal --format yaml > resources/otelcol-sealedsecret.yaml
#
# kubectl create secret generic grafana-secrets \
#   --from-literal=admin-password='YOUR_PASSWORD' \
#   --from-literal=gf-tg-bot-token='YOUR_TOKEN' \
#   --from-literal=gf-tg-chat-id='YOUR_CHAT_ID' \
#   --dry-run=client -o yaml | \
#   kubeseal --format yaml > resources/grafana-sealedsecret.yaml
#
# kubectl create secret generic influxdb-secrets \
#   --from-literal=admin-password='YOUR_PASSWORD' \
#   --from-literal=admin-token='YOUR_TOKEN' \
#   --dry-run=client -o yaml | \
#   kubeseal --format yaml > resources/influxdb-sealedsecret.yaml

---
apiVersion: v1
kind: Secret
metadata:
  name: otelcol-secrets
  namespace: observability
type: Opaque
stringData:
  bearer-token: "CHANGE_ME"
  snmp-auth-key: "CHANGE_ME"
  snmp-private-key: "CHANGE_ME"

---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: observability
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: "CHANGE_ME"
  GF_SECURITY_ADMIN_PASSWORD: "CHANGE_ME"
  GF_TG_BOT_TOKEN: "CHANGE_ME"
  GF_TG_CHAT_ID: "CHANGE_ME"

---
apiVersion: v1
kind: Secret
metadata:
  name: influxdb-secrets
  namespace: observability
type: Opaque
stringData:
  admin-password: "CHANGE_ME"
  admin-token: "CHANGE_ME"
