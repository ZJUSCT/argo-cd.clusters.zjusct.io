apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-claude-code-session-hook
  namespace: litellm
data:
  claude_code_session.py: |
    from litellm.integrations.custom_logger import CustomLogger
    import logging

    logger = logging.getLogger("claude_code_session")

    class ClaudeCodeSessionMapper(CustomLogger):
        """
        Session affinity for Claude Code — multi-worker safe via Redis.

        Strategy:
        - Always pass session_id into metadata so LiteLLM's built-in
          DeploymentAffinityCheck (session_affinity in optional_pre_call_checks)
          can read/write the Redis cache.
        - On request failure, clear the affinity cache so the next request
          re-routes via normal routing instead of retrying the dead deployment.

        LiteLLM's DeploymentAffinityCheck handles:
        - Pre-call:  look up Redis for session → deployment, filter to that
          deployment if found.
        - Post-call: persist session → deployment to Redis (via
          async_pre_call_deployment_hook).
        """

        HEADER = "x-claude-code-session-id"
        CACHE_PREFIX = "deployment_affinity:v1:session:"

        # ── helpers ──────────────────────────────────────────────

        def _get_session_id(self, data: dict) -> str:
            """Read session_id from the Claude Code request header."""
            headers = (
                data.get("proxy_server_request") or {}
            ).get("headers", {})
            return (
                headers.get(self.HEADER, "")
                if isinstance(headers, dict)
                else ""
            )

        async def _clear_affinity(self, session_id: str, model_group: str):
            try:
                from litellm.proxy.proxy_server import llm_router

                cache = getattr(llm_router, "cache", None)
                if not cache:
                    return

                key = f"{self.CACHE_PREFIX}{model_group}:{session_id}"

                if hasattr(cache, "async_delete_cache"):
                    await cache.async_delete_cache(key)
                elif hasattr(cache, "delete_cache"):
                    cache.delete_cache(key)

                logger.info(
                    "Cleared affinity cache for session %s on model %s",
                    session_id[:8],
                    model_group,
                )
            except Exception as exc:
                logger.warning("Failed to clear affinity cache: %s", exc)

        # ── hooks ───────────────────────────────────────────────

        async def async_pre_call_hook(
            self, user_api_key_dict, cache, data, call_type
        ):
            session_id = self._get_session_id(data)
            if not session_id:
                return data

            # Always pass session_id into metadata so LiteLLM's
            # DeploymentAffinityCheck can find the pinned deployment
            # in Redis and filter to it.
            if "metadata" not in data:
                data["metadata"] = {}
            data["metadata"]["session_id"] = session_id

            return data

        async def async_failure_call_hook(
            self, user_api_key_dict, cache, data, call_type
        ):
            session_id = self._get_session_id(data)
            if not session_id:
                return data

            model = data.get("model", "") or data.get(
                "model_info", {}
            ).get("model_name", "")
            if model:
                await self._clear_affinity(session_id, model)

            return data

    proxy_handler_instance = ClaudeCodeSessionMapper()
