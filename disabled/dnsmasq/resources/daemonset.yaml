apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dnsmasq
  namespace: dnsmasq
  labels:
    app.kubernetes.io/name: dnsmasq
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dnsmasq
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dnsmasq
    spec:
      hostNetwork: true
      dnsPolicy: Default
      priorityClassName: system-cluster-critical
      tolerations:
      - operator: Exists
      containers:
      - name: dnsmasq
        image: ghcr.io/dockur/dnsmasq:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: dns-udp
          containerPort: 53
          protocol: UDP
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - NET_BIND_SERVICE
        volumeMounts:
        - name: config
          mountPath: /etc/dnsmasq.conf
          subPath: dnsmasq.conf
          readOnly: true
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: dnsmasq-config
