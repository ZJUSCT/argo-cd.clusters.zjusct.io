# Template SealedSecret for Velero cloud credentials (Aliyun OSS).
# Replace with real credentials using:
#
#   kubectl create secret generic velero-cloud-credentials \
#     --namespace=velero \
#     --from-literal=cloud='[default]
# aws_access_key_id=<YOUR_ACCESS_KEY>
# aws_secret_access_key=<YOUR_SECRET_KEY>' \
#     --dry-run=client -o yaml | \
#   kubeseal --format yaml > production/velero/resources/sealedsecret-cloud-credentials.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: velero-cloud-credentials
  namespace: velero
spec:
  encryptedData:
    cloud: AgCEPLACEHOLDER_REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: velero-cloud-credentials
      namespace: velero
    type: Opaque
