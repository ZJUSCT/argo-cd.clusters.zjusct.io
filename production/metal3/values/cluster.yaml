# values in global config can be overridden by node specific config.
# if not configured, default will be used.
default:
  bootMode: UEFI
  automatedCleaningMode: disabled
  bmc:
    credentialsName: bmc-credential
  image:
    url: https://radosgw.clusters.zjusct.io/packer-images/a625f2b/debian-13-amd64.qcow2
    checksumType: sha256
    checksum: https://radosgw.clusters.zjusct.io/packer-images/a625f2b/SHA256SUMS
    format: qcow2
  rootDeviceHints:
    rotational: false
    vendor: "ATA"

