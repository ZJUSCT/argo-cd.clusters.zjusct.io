apiVersion: v1
kind: ConfigMap
metadata:
  name: mihomo-network
  namespace: mihomo
data:
  setup.sh: |
    #!/bin/sh
    set -eu

    ip link set net1 up
    ip addr replace 172.25.4.3/24 dev net1
    ip route add 172.25.123.0/24 dev net1 src 172.25.4.3 via 172.25.4.254
    ip route add 172.25.2.0/24 dev net1 src 172.25.4.3 via 172.25.4.254

    sysctl -w net.ipv4.ip_forward=1
    sysctl -w net.ipv4.conf.all.rp_filter=0
    sysctl -w net.ipv4.conf.net1.rp_filter=0

    ip rule add fwmark 0x2d0 lookup 720 2>/dev/null || true
    ip route replace local default dev lo table 720

    nft -f /etc/mihomo-network/mihomo.nft
  mihomo.nft: |
    table ip mihomo {
        chain prerouting {
            type filter hook prerouting priority mangle; policy accept;

            meta mark 0x2d0 accept
            ip daddr 198.18.0.0/16 meta l4proto tcp meta mark set 0x2d0 tproxy to 172.25.4.3:7893 accept
            ip daddr 198.18.0.0/16 meta l4proto udp meta mark set 0x2d0 tproxy to 172.25.4.3:7893 accept
        }

        chain output {
            type route hook output priority mangle; policy accept;

            meta mark 0x2d0 accept
            ip daddr 198.18.0.0/16 meta l4proto tcp meta mark set 0x2d0
            ip daddr 198.18.0.0/16 meta l4proto udp meta mark set 0x2d0
        }
    }
