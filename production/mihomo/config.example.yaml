# Reference Mihomo config for this repo's fake-ip + TPROXY setup.
# Copy to a private local file such as `production/mihomo/config.yaml`,
# then apply it with:
#   production/mihomo/scripts/mihomo-apply-config.sh production/mihomo/config.yaml

mixed-port: 7890
tproxy-port: 7892
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
unified-delay: true

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 11.255.0.0/16
  fake-ip-filter:
    - "*.clusters.zjusct.io"
    - "*.cluster.local"
    - "*.svc"
    - "*.svc.cluster.local"
    - "*.local"
    - "localhost.ptlogin2.qq.com"
  default-nameserver:
    - 223.5.5.5
    - 1.1.1.1
  nameserver:
    - https://dns.alidns.com/dns-query

proxies:
  - name: example-socks5
    type: socks5
    server: 203.0.113.10
    port: 1080
    username: your-username
    password: your-password
    udp: true

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - example-socks5
      - DIRECT

rules:
  - DOMAIN-SUFFIX,clusters.zjusct.io,DIRECT
  - DOMAIN-SUFFIX,cluster.local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve
  - MATCH,PROXY
