cephBlockPools:
  - name: ceph-blockpool
    namespace: rook-ceph
    spec:
      failureDomain: host
      replicated:
        size: 2

    storageClass:
      enabled: true
      name: ceph-block
      isDefault: true
      reclaimPolicy: Delete
      allowVolumeExpansion: true
      volumeBindingMode: "Immediate"

cephObjectStores:
  - name: default
    namespace: rook-ceph
    spec:
      allowUsersInNamespaces:
        - "*"

      metadataPool:
        failureDomain: host
        replicated:
          size: 2
          min_size: 1
        parameters:
          pg_autoscale_mode: "off"

      dataPool:
        failureDomain: host
        replicated:
          size: 2
          min_size: 1
        parameters:
          pg_autoscale_mode: "off"

      preservePoolsOnDelete: true

      gateway:
        port: 8080
        instances: 2
        priorityClassName: system-cluster-critical

    storageClass:
      enabled: true
      name: ceph-bucket
      reclaimPolicy: Delete
      volumeBindingMode: "Immediate"
      parameters:
        region: us-east-1

    route:
      enabled: true
      host:
        name: radosgw.clusters.zjusct.io
        path: /
        pathType: PathPrefix
      parentRefs:
        - name: envoy-gateway
          namespace: default

cephFileSystems:
  - name: cephfs
    namespace: rook-ceph
    spec:
      metadataPool:
        failureDomain: host
        crushRule: nvme
        replicated:
          size: 2
          min_size: 1
        parameters:
          pg_autoscale_mode: "off"

      dataPools:
        - name: cephfs-hdd-data
          failureDomain: host
          crushRule: hdd
          replicated:
            size: 2
            min_size: 1
          parameters:
            pg_autoscale_mode: "off"

        - name: cephfs-nvme-data
          failureDomain: host
          crushRule: nvme
          replicated:
            size: 2
            min_size: 1
          parameters:
            pg_autoscale_mode: "off"

        - name: cephfs-ssd-data
          failureDomain: host
          crushRule: ssd
          replicated:
            size: 2
            min_size: 1
          parameters:
            pg_autoscale_mode: "off"

        - name: cephfs-home
          failureDomain: host
          crushRule: nvme
          replicated:
            size: 2
            min_size: 1
          parameters:
            pg_autoscale_mode: "off"

      preserveFilesystemOnDelete: true

      metadataServer:
        activeCount: 2
        activeStandby: true
        priorityClassName: system-cluster-critical

    storageClass:
      enabled: true
      isDefault: true
      name: cephfs
      # pool: # do not specify pool
      reclaimPolicy: Delete
      allowVolumeExpansion: true
      volumeBindingMode: "Immediate"
      annotations: {}
      labels: {}
      mountOptions: []
      parameters:
        # The secrets contain Ceph admin credentials.
        csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
        csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
        csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/controller-publish-secret-name: rook-csi-cephfs-provisioner
        csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
        csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
