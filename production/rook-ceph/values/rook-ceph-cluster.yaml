# https://github.com/rook/rook/blob/master/deploy/charts/rook-ceph-cluster/values.yaml
configOverride: |
  [global]
  mon_allow_pool_delete = true
  osd_pool_default_size = 2
  osd_pool_default_min_size = 1
  auth_allow_insecure_global_id_reclaim = false

toolbox:
  enabled: true

route:
  dashboard:
    host:
      #name: ceph.s.zjusct.io
      name: ceph.clusters.zjusct.io
    parentRefs:
      - name: envoy-gateway
        namespace: default

monitoring:
  enabled: true
  # createPrometheusRules: true

cephClusterSpec:
  network:
    provider: host
    addressRanges:
      public:
        - "172.25.4.0/24" # 以太网
      cluster:
        - "172.25.0.0/24" # IB

  placement:
    all:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: ceph
                  operator: In
                  values: ["yes"]

    mon:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: ceph-core
                  operator: In
                  values: ["preferred"]

    mgr:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: ceph-core
                  operator: In
                  values: ["preferred"]

  mon:
    count: 3
    allowMultiplePerNode: false

  mgr:
    count: 2
    allowMultiplePerNode: false
    modules:
      - name: pg_autoscaler
        enabled: false
      - name: balancer
        enabled: true
      - name: rook
        enabled: true
      - name: dashboard
        enabled: true
      - name: nfs
        enabled: false
      - name: restful
        enabled: true

  dashboard:
    enabled: true
    ssl: false

  storage:
    useAllNodes: false
    useAllDevices: false
    nodes:
      - name: "storage"
        devices:
          - name: "/dev/disk/by-id/wwn-0x5000c500a3a22588"
            config:
              deviceClass: hdd
          - name: "/dev/disk/by-id/wwn-0x5000c500a39cd7f3"
            config:
              deviceClass: hdd
          - name: "/dev/disk/by-id/wwn-0x5000c500a3a1e885"
            config:
              deviceClass: hdd
          - name: "/dev/disk/by-id/wwn-0x5000cca24cc17625"
