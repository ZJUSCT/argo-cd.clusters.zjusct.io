apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-core
  namespace: default
data:
  # Override CORE_URL to use FQDN so Harbor recognizes requests from BuildKit
  # This fixes the WWW-Authenticate realm URL to use HTTP instead of HTTPS
  # See: https://github.com/goharbor/harbor/issues/12364
  CORE_URL: "http://harbor-core.default.svc.cluster.local:80"
  TOKEN_SERVICE_URL: "http://harbor-core.default.svc.cluster.local:80/service/token"
