# https://github.com/cilium/cilium/blob/main/install/kubernetes/cilium/values.yaml

# https://docs.cilium.io/en/stable/network/kubernetes/ipam-cluster-pool/
ipam:
  mode: kubernetes
kubeProxyReplacement: false
k8s:
  requireIPv4PodCIDR: true

hubble:
  metrics:
    serviceMonitor:
      enabled: true
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
    ingress:
      enabled: true
      className: "nginx"
      hosts:
        - hubble.clusters.zjusct.io
        - hubble.s.zjusct.io
  backend:
    image:
      repository: harbor.clusters.zjusct.io/quay.io/cilium/hubble-ui-backend
  frontend:
    image:
      repository: harbor.clusters.zjusct.io/quay.io/cilium/hubble-ui

prometheus:
  metricsService: true
  enabled: true
  serviceMonitor:
    enabled: true
    trustCRDsExist: true
