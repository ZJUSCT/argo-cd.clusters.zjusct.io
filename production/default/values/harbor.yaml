# https://github.com/goharbor/harbor-helm/blob/main/values.yaml

expose:
  type: route
  tls:
    enabled: false
  route:
    parentRefs:
      - name: envoy-gateway
        namespace: default
    hosts:
      - harbor.clusters.zjusct.io
      - harbor.s.zjusct.io

externalURL: https://harbor.clusters.zjusct.io

persistence:
  persistentVolumeClaim:
    registry:
      size: 500Gi
