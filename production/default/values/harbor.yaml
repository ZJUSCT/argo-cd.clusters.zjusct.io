# https://github.com/goharbor/harbor-helm/blob/main/values.yaml

expose:
  type: route
  tls:
    enabled: false
  route:
    parentRefs:
      - name: envoy-gateway
        namespace: default
    hosts:
      - harbor.clusters.zjusct.io
      - harbor.s.zjusct.io

externalURL: https://harbor.clusters.zjusct.io

# Use Recreate strategy for deployments with ReadWriteOnce PVCs to avoid multi-attach errors
updateStrategy:
  type: Recreate

persistence:
  persistentVolumeClaim:
    registry:
      size: 500Gi

# Use existing secrets (SealedSecrets) to prevent regeneration on every upgrade
core:
  existingSecret: harbor-core-sealed-secret

jobservice:
  existingSecret: harbor-jobservice-sealed-secret

registry:
  existingSecret: harbor-registry-sealed-secret
