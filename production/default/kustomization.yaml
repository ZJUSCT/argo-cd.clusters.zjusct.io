apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
- resources/cilium-lb-ipam-pool.yaml
- resources/cilium-bgp-cluster-config.yaml
- resources/cilium-bgp-peer-config.yaml
- resources/cilium-bgp-advertisement.yaml
helmCharts:
- name: cilium
  repo: https://helm.cilium.io/
  includeCRDs: true
  releaseName: cilium
  valuesFile: values/cilium-1.19.0.yaml
  version: 1.19.0
  namespace: default
