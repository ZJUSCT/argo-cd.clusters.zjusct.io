apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
patches:
- path: patches/harbor-core-cm-patch.yaml
  target:
    kind: ConfigMap
    name: harbor-core
resources:
- resources/envoy-gateway.yaml
- resources/harbor-core-sealedsecret.yaml
- resources/harbor-jobservice-sealedsecret.yaml
- resources/harbor-registry-sealedsecret.yaml
helmCharts:
- name: cilium
  repo: https://helm.cilium.io/
  includeCRDs: true
  releaseName: cilium
  valuesFile: values/cilium-1.19.0.yaml
  version: 1.19.0
  namespace: default
- name: gateway-helm
  repo: oci://docker.io/envoyproxy/
  includeCRDs: true
  releaseName: envoy-gateway
  valuesFile: values/gateway-helm-1.7.0.yaml
  namespace: default
  version: 1.7.0
- name: harbor
  repo: https://helm.goharbor.io
  includeCRDs: true
  releaseName: harbor
  valuesFile: values/harbor-1.18.2.yaml
  version: 1.18.2
  namespace: default
