# kubectl create secret generic litellm-api-keys --namespace litellm --from-literal=OPENAI_API_KEY=sk-xxx --from-literal=ANTHROPIC_API_KEY=sk-xxx --dry-run=client -o yaml | kubeseal -o yaml > sealedsecret-api-keys.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: litellm-api-keys
  namespace: litellm
spec:
  encryptedData:
    ANTHROPIC_API_KEY: 
    OPENAI_API_KEY: 
  template:
    metadata:
      name: litellm-api-keys
      namespace: litellm
