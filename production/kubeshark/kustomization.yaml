apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubeshark
resources:
- resources/namespace.yaml
helmCharts:
- name: kubeshark
  repo: https://helm.kubeshark.com
  version: 52.12.0
  includeCRDs: true
  releaseName: kubeshark
  valuesFile: values/kubeshark-52.12.0.yaml
  namespace: kubeshark
transformers:
  - ../../image-prefix.yaml
