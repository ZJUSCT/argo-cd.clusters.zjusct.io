auth:
  username: sub2api
  database: sub2api
  existingSecret: sub2api-secrets
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: database-password

primary:
  persistence:
    size: 10Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
