# https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
  - resources/namespace.yaml
  - resources/grafana-sealedsecret.yaml
  # - resources/grafana-datasources.yaml
  # - resources/clickhouse-statefulset.yaml
  # After creating sealed secrets, uncomment:
  # - resources/otelcol-sealedsecret.yaml
  # - resources/influxdb-sealedsecret.yaml

helmCharts:
# Grafana for visualization and alerting
- name: grafana
  repo: https://grafana-community.github.io/helm-charts
  includeCRDs: true
  releaseName: grafana
  namespace: observability
  valuesFile: values/grafana.yaml

# Prometheus for metrics storage
- name: prometheus
  repo: https://prometheus-community.github.io/helm-charts
  includeCRDs: true
  releaseName: prometheus
  namespace: observability
  valuesFile: values/prometheus.yaml

