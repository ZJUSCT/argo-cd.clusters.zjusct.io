# https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
  - resources/namespace.yaml
  - resources/grafana-sealedsecret.yaml
  - resources/clickhouse-statefulset.yaml
  # - resources/grafana-datasources.yaml
  # After creating sealed secrets, uncomment:
  # - resources/otelcol-sealedsecret.yaml
  # - resources/influxdb-sealedsecret.yaml
  - resources/thanos-obc.yaml

helmCharts:
# Kube Prometheus Stack - includes Prometheus Operator, Prometheus, Grafana, and exporters
- name: kube-prometheus-stack
  repo: https://prometheus-community.github.io/helm-charts
  includeCRDs: true
  releaseName: kube-prometheus-stack
  namespace: observability
  valuesFile: values/kube-prometheus-stack.yaml

# Thanos - Disabled for now, will enable later with rook-ceph ObjectBucketClaim
- name: thanos
  repo: https://charts.bitnami.com/bitnami
  includeCRDs: true
  releaseName: thanos
  namespace: observability
  valuesFile: values/thanos.yaml
  version: 17.3.1

