# https://github.com/prometheus-community/helm-charts/blob/main/charts/prometheus/values.yaml

image:
  repository: harbor.clusters.zjusct.io/quay.io/prometheus/prometheus

configmapReload:
  prometheus:
    image:
      repository: harbor.clusters.zjusct.io/quay.io/prometheus-operator/prometheus-config-reloader

server:
  image:
    repository: harbor.clusters.zjusct.io/quay.io/prometheus/prometheus
  # Persistence for Prometheus data
  persistentVolume:
    enabled: true
    size: 50Gi
    storageClass: "" # Use default storage class

  # Retention configuration
  retention: "180d"

  # Enable remote write receiver
  enableRemoteWriteReceiver: true

  # Enable admin API
  enableAdminAPI: true

  # Service configuration
  service:
    type: ClusterIP
    servicePort: 9090

  # Gateway API HTTPRoute configuration
  route:
    main:
      enabled: true
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      parentRefs:
        - name: envoy-gateway
          namespace: default
      hostnames:
        - prometheus.clusters.zjusct.io

  # Resource limits
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 2Gi

# Enable components (using defaults from Helm chart)
# These are enabled by default but listed here for visibility
alertmanager:
  enabled: false

pushgateway:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
