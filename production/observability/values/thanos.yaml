# https://github.com/bitnami/charts/blob/main/bitnami/thanos/values.yaml

image:
  registry: docker.io
  repository: bitnami/thanos
  tag: 0.39.2 # 建议锁定版本，避免漂移

existingObjstoreSecret: thanos-objstore-config
objstoreConfig: "objstore.yml"

minio:
  enabled: false

# Query component - provides a unified query API
query:
  enabled: true
  replicaCount: 1

  dnsDiscovery:
    enabled: true
    sidecarsService: "prometheus-operated"
    sidecarsNamespace: "observability"

  stores:
    - "thanos-storegateway:10901"

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  service:
    type: ClusterIP
    ports:
      http: 9090

# Store Gateway - serves metrics from object storage
storegateway:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: true
    size: 8Gi
  
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# Compactor - compacts and downsamples data in object storage
compactor:
  enabled: true
  persistence:
    enabled: true
    size: 8Gi # 临时工作盘，数据量大时建议给 20Gi+

  retentionResolutionRaw: 30d  # 原始数据保留 30 天
  retentionResolution5m: 180d # 5分钟精度保留半年
  retentionResolution1h: 10y  # 1小时精度保留10年

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# Ruler - for recording and alerting rules
ruler:
  enabled: false

# Receive - for remote write
receive:
  enabled: false

# Metrics configuration
metrics:
  enabled: true
  serviceMonitor:
    enabled: true # 建议开启，这样 Prometheus 也能监控 Thanos 自己
    labels:
      release: prometheus # 确保这个标签和你的 Prometheus 匹配

queryFrontend:
  enabled: false