# https://github.com/bitnami/charts/blob/main/bitnami/thanos/values.yaml

image:
  registry: harbor.clusters.zjusct.io/docker.io
  repository: bitnami/thanos

# Query component - provides a unified query API
query:
  enabled: true
  replicaCount: 1

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  # Expose query via service
  service:
    type: ClusterIP
    ports:
      http: 9090

# Store Gateway - serves metrics from object storage
storegateway:
  enabled: true
  replicaCount: 1

  persistence:
    enabled: true
    size: 8Gi

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# Compactor - compacts and downsamples data in object storage
compactor:
  enabled: true

  persistence:
    enabled: true
    size: 8Gi

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# Ruler - for recording and alerting rules
ruler:
  enabled: false

# Receive - for remote write (optional, can use Prometheus remote write receiver instead)
receive:
  enabled: false

# Metrics configuration
metrics:
  enabled: true
  serviceMonitor:
    enabled: false

# Object storage configuration
# For now, using local storage. In production, configure S3-compatible storage
objstoreConfig: ""

# Query Frontend (optional, for query caching and splitting)
queryFrontend:
  enabled: false
