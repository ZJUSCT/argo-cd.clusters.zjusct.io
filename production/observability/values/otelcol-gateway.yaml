# OpenTelemetry Collector Gateway Helm Chart Values
# https://github.com/open-telemetry/opentelemetry-helm-charts/tree/main/charts/opentelemetry-collector

mode: deployment

replicaCount: 1

# Image configuration
image:
  repository: otel/opentelemetry-collector-contrib
  tag: "" # Use latest stable version

# Service configuration
service:
  type: LoadBalancer
  ports:
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    otlp-grpc:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    syslog-udp:
      enabled: true
      containerPort: 514
      servicePort: 514
      protocol: UDP
    netflow-udp:
      enabled: true
      containerPort: 2055
      servicePort: 2055
      protocol: UDP
    health:
      enabled: true
      containerPort: 13133
      servicePort: 13133
      protocol: TCP

# Resource limits
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# OpenTelemetry Collector configuration
config:
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
      response_body:
        healthy: "ok"
    pprof:
      endpoint: 0.0.0.0:1777
    zpages:
      endpoint: 0.0.0.0:55679
    bearertokenauth:
      token: ${env:OTEL_BEARER_TOKEN}

  receivers:
    otlp/with_auth:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
          auth:
            authenticator: bearertokenauth
    otlp/internal:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
    netflow:
      scheme: netflow
      port: 2055
      sockets: 16
      workers: 32
    syslog:
      udp:
        listen_address: 0.0.0.0:514
        add_attributes: true
        one_log_per_packet: true
      protocol: rfc3164
      location: Asia/Shanghai
      operators:
        - type: move
          from: attributes["hostname"]
          to: resource["host.name"]
        - type: move
          from: attributes["message"]
          to: body

  processors:
    resource/cloud:
      attributes:
        - key: cloud.region
          value: "zjusct-cluster"
          action: insert
    batch: {}
    memory_limiter:
      check_interval: 1s
      limit_percentage: 50
      spike_limit_percentage: 30

  exporters:
    debug:
      verbosity: basic
    clickhouse:
      endpoint: clickhouse://clickhouse:9000
      ttl: 4320h
    prometheusremotewrite:
      endpoint: http://prometheus-server:9090/api/v1/write
      resource_to_telemetry_conversion:
        enabled: true
      retry_on_failure:
        enabled: true
        initial_interval: 10s
        max_interval: 60s
        max_elapsed_time: 10m
      add_metric_suffixes: true

  service:
    extensions: [health_check, pprof, zpages, bearertokenauth]
    pipelines:
      logs:
        receivers: [otlp/with_auth, otlp/internal]
        processors: [memory_limiter, batch, resource/cloud]
        exporters: [clickhouse]
      traces:
        receivers: [otlp/with_auth, otlp/internal]
        processors: [memory_limiter, batch, resource/cloud]
        exporters: [clickhouse]
      metrics:
        receivers: [otlp/with_auth, otlp/internal]
        processors: [memory_limiter, batch, resource/cloud]
        exporters: [prometheusremotewrite]
      logs/other:
        receivers: [syslog, netflow]
        processors: [memory_limiter, batch, resource/cloud]
        exporters: [clickhouse]

# Environment variables from secrets
extraEnvs:
  - name: OTEL_BEARER_TOKEN
    valueFrom:
      secretKeyRef:
        name: otelcol-secrets
        key: bearer-token
