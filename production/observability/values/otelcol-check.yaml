# OpenTelemetry Collector Check Helm Chart Values
# https://github.com/open-telemetry/opentelemetry-helm-charts/tree/main/charts/opentelemetry-collector

mode: deployment

replicaCount: 1

# Image configuration
image:
  repository: otel/opentelemetry-collector-contrib
  tag: "" # Use latest stable version

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# OpenTelemetry Collector configuration
config:
  receivers:
    # TLS certificate check
    tlscheck:
      targets:
        - endpoint: git.zju.edu.cn:443
        - endpoint: mirror.zju.edu.cn:443
        - endpoint: mirrors.zju.edu.cn:443
        - endpoint: clusters.zju.edu.cn:443
        - endpoint: www.clusters.zjusct.io:443

    # TCP connectivity checks for cluster
    tcpcheck/cluster:
      targets:
        - endpoint: 172.25.4.9:22
        - endpoint: 172.25.4.10:22
        - endpoint: 172.25.4.40:22
        # Add more endpoints from original config

    # HTTP health checks for cluster
    httpcheck/cluster:
      targets:
        - method: GET
          endpoints:
            - https://172.25.3.5
            - https://172.25.3.9
            - https://172.25.3.10
            # Add more endpoints from original config
          tls:
            insecure_skip_verify: true

    # HTTP checks for ZJU services
    httpcheck/zju:
      targets:
        - method: GET
          endpoints:
            - https://www.cc98.org/
            - https://mirror.zju.edu.cn/
            - https://www.zju.edu.cn/
            - https://www.clusters.zjusct.io/

    # HTTP checks for internet connectivity
    httpcheck/internet:
      targets:
        - method: GET
          endpoints:
            - https://www.baidu.com/
            - https://www.qq.com/
            - https://www.zhihu.com/
            - https://www.bilibili.com/

  processors:
    batch: {}
    memory_limiter:
      limit_mib: 512
      spike_limit_mib: 128
      check_interval: 5s
    resource/cloud-cluster:
      attributes:
        - key: cloud.region
          value: "zjusct-cluster"
          action: insert
    resource/cloud-campus:
      attributes:
        - key: cloud.region
          value: "zju"
          action: insert
    resource/cloud-internet:
      attributes:
        - key: cloud.region
          value: "internet"
          action: insert

  exporters:
    otlp/gateway:
      endpoint: otelcol-gateway:4317
      tls:
        insecure: true

  service:
    pipelines:
      metrics/tls:
        receivers: [tlscheck]
        processors: [memory_limiter, batch]
        exporters: [otlp/gateway]
      metrics/http-cluster:
        receivers: [httpcheck/cluster, tcpcheck/cluster]
        processors: [memory_limiter, batch, resource/cloud-cluster]
        exporters: [otlp/gateway]
      metrics/http-zju:
        receivers: [httpcheck/zju]
        processors: [memory_limiter, batch, resource/cloud-campus]
        exporters: [otlp/gateway]
      metrics/http-internet:
        receivers: [httpcheck/internet]
        processors: [memory_limiter, batch, resource/cloud-internet]
        exporters: [otlp/gateway]
