# https://github.com/grafana-community/helm-charts/blob/main/charts/grafana/values.yaml

# Image configuration
image:
  registry: harbor.clusters.zjusct.io/docker.io
  repository: grafana/grafana
  pullPolicy: IfNotPresent

# Admin credentials
admin:
  existingSecret: grafana-secrets
  userKey: admin-user
  passwordKey: admin-password

# Persistence for Grafana data
persistence:
  enabled: true
  size: 10Gi
  storageClassName: "" # Use default storage class

# Service configuration
service:
  type: ClusterIP
  port: 80

# Ingress configuration - disabled, using Gateway API instead
ingress:
  enabled: false

# Gateway API HTTPRoute configuration
route:
  main:
    enabled: true
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    parentRefs:
      - name: envoy-gateway
        namespace: default
    hostnames:
      - grafana.clusters.zjusct.io

# Environment variables
env:
  GF_INSTALL_PLUGINS: grafana-clickhouse-datasource

# Environment variables from secrets
envFromSecrets:
  - name: grafana-secrets

# Provisioning
# Mount existing provisioning configs from ConfigMaps
sidecar:
  image:
    registry: harbor.clusters.zjusct.io/quay.io
    repository: kiwigrid/k8s-sidecar
  dashboards:
    enabled: true
    folder: /tmp/dashboards
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true
  datasources:
    enabled: true
  notifiers:
    enabled: true

# Download dashboards image
downloadDashboardsImage:
  registry: harbor.clusters.zjusct.io/docker.io
  repository: curlimages/curl

# Init chown data image
initChownData:
  image:
    registry: harbor.clusters.zjusct.io/docker.io
    repository: library/busybox

# Resource limits
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# Grafana configuration from grafana.ini
grafana.ini:
  server:
    root_url: https://grafana.clusters.zjusct.io
  users:
    default_theme: system
    home_page: /dashboards
  security:
    allow_embedding: true
    disable_gravatar: true
  log:
    level: warn
  tracing.opentelemetry:
    custom_attributes: service.name:grafana
  tracing.opentelemetry.otlp:
    address: otelcol-gateway:4317
