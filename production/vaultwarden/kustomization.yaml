apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vaultwarden
resources:
  - resources/namespace.yaml
  - resources/httproute.yaml

helmCharts:
  - name: vaultwarden
    repo: https://guerzon.github.io/vaultwarden
    includeCRDs: true
    releaseName: vaultwarden
    version: 0.36.4
    namespace: vaultwarden
    valuesFile: values/vaultwarden-0.36.4.yaml

transformers:
  - ../../image-prefix.yaml
