apiVersion: v1
kind: ConfigMap
metadata:
  name: dnsmasq-config
  namespace: dnsmasq
data:
  dnsmasq.conf: |
    # https://github.com/imp/dnsmasq/blob/master/dnsmasq.conf.example
    # https://thekelleys.org.uk/dnsmasq/docs/dnsmasq-man.html
    # --- Global Settings ---
    domain-needed # never forward A or AAAA queries for plain names, without dots or domain parts, to upstream nameservers
    bogus-priv
    no-resolv # Don't read /etc/resolv.conf. It's controlled by k8s.

    # Interface settings
    # Notice that dnsmasq uses hostNetwork
    except-interface=lo # lo is managed by systemd-resolved
    bind-dynamic # listen to all non-loopback interfaces, including cilium_host and br0
    cache-size=10000

    # debug
    log-queries

    # --- Specific Internal Overrides ---
    # These 'address' lines take highest priority (Static/Handwritten)
    address=/k8s-api.clusters.zjusct.io/172.25.4.1
    address=/ipa-01.clusters.zjusct.io/172.28.0.2
    # OpenNG served domains
    address=/netgate.clusters.zjusct.io/172.25.4.3
    address=/clusters.zju.edu.cn/172.28.0.1

    # --- BMC / Management DNS ---
    address=/storage-bmc.clusters.zjusct.io/172.25.3.11
    address=/m4-bmc.clusters.zjusct.io/172.25.3.41
    address=/m600-bmc.clusters.zjusct.io/172.25.3.60
    address=/m601-bmc.clusters.zjusct.io/172.25.3.61
    address=/m602-bmc.clusters.zjusct.io/172.25.3.62
    address=/m603-bmc.clusters.zjusct.io/172.25.3.63
    address=/m604-bmc.clusters.zjusct.io/172.25.3.64
    address=/root-bmc.clusters.zjusct.io/172.25.3.65
    address=/atlas800-bmc.clusters.zjusct.io/172.25.3.66

    address=/m700-bmc.clusters.zjusct.io/172.25.3.70
    address=/m701-bmc.clusters.zjusct.io/172.25.3.71
    address=/a700-bmc.clusters.zjusct.io/172.25.3.72
    address=/nvidia-spark-bmc.clusters.zjusct.io/172.25.3.73
    address=/m800-bmc.clusters.zjusct.io/172.25.3.80

    # --- Infrastucture DNS ---
    address=/ib40.clusters.zjusct.io/172.25.3.200

    address=/pdu1.clusters.zjusct.io/172.25.3.231
    address=/pdu2.clusters.zjusct.io/172.25.3.232
    address=/pdu3.clusters.zjusct.io/172.25.3.233

    address=/swc0.clusters.zjusct.io/172.25.3.240
    address=/swc1.clusters.zjusct.io/172.25.3.241
    address=/swc2.clusters.zjusct.io/172.25.3.242
    address=/swc3.clusters.zjusct.io/172.25.3.243

    # --- Routing Logic ---

    # 1. Local/Internal: Route all subdomains of clusters.zjusct.io to FreeIPA
    server=/clusters.zjusct.io/172.28.0.2
    server=/clusters.zjusct.io/172.28.0.3
    server=/clusters.zjusct.io/172.28.0.5

    # This prevents dnsmasq from trying to resolve *.clusters.zjusct.io
    # via the global upstream if FreeIPA returns NXDOMAIN.
    local=/clusters.zjusct.io/

    # 2. Reverse DNS: Route local IP ranges to FreeIPA
    server=/3.25.172.in-addr.arpa/172.28.0.2
    server=/3.25.172.in-addr.arpa/172.28.0.3
    server=/3.25.172.in-addr.arpa/172.28.0.5
    server=/4.25.172.in-addr.arpa/172.28.0.2
    server=/4.25.172.in-addr.arpa/172.28.0.3
    server=/4.25.172.in-addr.arpa/172.28.0.5

    # 3. Global routing. mihomo is the primary resolver, campus
    #    DNS is the failover, used only when mihomo is down (e.g. during rollout).
    #
    #    strict-order is REQUIRED here. Without it dnsmasq periodically races the
    #    two catch-all upstreams and keeps the fastest.
    strict-order
    server=172.25.4.3#1053
    server=10.10.0.21
    server=10.10.2.21
