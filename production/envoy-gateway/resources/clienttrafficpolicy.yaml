apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: client-traffic-policy
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
  tls:
    alpnProtocols:
    - h2
    - http/1.1
  headers:
    withUnderscoresAction: Allow
