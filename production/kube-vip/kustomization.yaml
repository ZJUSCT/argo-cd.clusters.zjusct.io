apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-vip
resources:
- resources/namespace.yaml
helmCharts:
- name: kube-vip
  repo: https://kube-vip.github.io/helm-charts
  includeCRDs: true
  releaseName: kube-vip
  namespace: kube-vip
  valuesFile: values/kube-vip-0.9.9.yaml
  version: 0.9.9
transformers:
- ../../image-prefix.yaml
