apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  # settings.yaml: |
  #   providers:
  #     longhorn:
  #       url: https://harbor.clusters.zjusct.io
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - ZJUSCT:
        - HomePage:
            abbr: HP
            href: https://www.zjusct.io
        - GitHub:
            abbr: GH
            href: https://github.com/zjusct
  services.yaml: |
    - Cluster Management:
        - Argo CD:
            href: https://argo-cd.clusters.zjusct.io
            description: GitOps continuous deployment
            icon: argocd
        - Headlamp:
            href: https://headlamp.clusters.zjusct.io
            description: Kubernetes dashboard
            icon: kubernetes
        - Tekton:
            href: https://tekton.clusters.zjusct.io
            description: Kubernetes-native CI/CD
            icon: tekton
    - CI/CD:
        - Jenkins:
            href: https://jenkins.clusters.zjusct.io
            description: Continuous integration
            icon: jenkins
    - Storage:
        - Harbor:
            href: https://harbor.clusters.zjusct.io
            description: Container image registry
            icon: harbor
        - Rook-Ceph:
            href: https://ceph.clusters.zjusct.io
            description: Distributed storage dashboard
            icon: ceph
        - Dragonfly:
            href: https://dragonfly.clusters.zjusct.io
            description: P2P file distribution
            icon: dragonfly
    - Monitoring:
        - Grafana:
            href: https://grafana.clusters.zjusct.io
            description: Metrics visualization
            icon: grafana
        - Prometheus:
            href: https://prometheus.clusters.zjusct.io
            description: Metrics collection
            icon: prometheus
        - Alertmanager:
            href: https://alertmanager.clusters.zjusct.io
            description: Alert management
            icon: prometheus
        - Hubble:
            href: https://hubble.clusters.zjusct.io
            description: Cilium network observability
            icon: cilium
    - Other:
        - LiteLLM:
            href: https://litellm.clusters.zjusct.io
            description: LLM proxy gateway
            icon: opensource
        - OpenTelemetry:
            href: https://otel-http.clusters.zjusct.io
            description: Observability collector
            icon: opentelemetry
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
