apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: new-api
  labels:
    app: new-api
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway
  hostnames:
    - newapi.clusters.zjusct.io
  rules:
    - backendRefs:
        - name: new-api
          port: 3000
      timeouts:
        request: 0s
        backendRequest: 0s
