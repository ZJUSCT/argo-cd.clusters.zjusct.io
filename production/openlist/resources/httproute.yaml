apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openlist
  labels:
    app: openlist
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - openlist.clusters.zjusct.io
    - openlist.s.zjusct.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: openlist
          port: 5244
          weight: 1
