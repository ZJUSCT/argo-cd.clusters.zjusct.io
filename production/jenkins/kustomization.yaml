# https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jenkins

resources:
  - resources.yaml
  - sealedsecret.yaml

helmCharts:
- name: jenkins
  repo: https://charts.jenkins.io
  includeCRDs: true
  releaseName: jenkins
  valuesFile: values.yaml
