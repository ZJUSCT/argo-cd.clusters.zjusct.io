apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: aggregator
spec:
  image: "harbor.clusters.zjusct.io/ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.146.1"
  mode: deployment
  replicas: 1
  config:
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
    exporters:
      debug:
        verbosity: detailed
        sampling_initial: 5
        sampling_thereafter: 200
      # https://github.com/open-telemetry/opentelemetry-collector/tree/main/exporter/otlpexporter
      otlp_grpc/tempo:
        endpoint: "tempo.kube-prometheus-stack:4317"
      # https://github.com/open-telemetry/opentelemetry-collector/tree/main/exporter/otlphttpexporter
      otlp_http/loki:
        endpoint: "http://loki.kube-prometheus-stack:3100/otlp"
      # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/exporter/prometheusremotewriteexporter
      prometheusremotewrite:
        endpoint: "http://kube-prometheus-stack-prometheus.kube-prometheus-stack:9090/api/v1/write"
        # OpenTelemetry resource attributes are key-value pairs representing the entity producing telemetry (e.g., service, host, container). When ingested into Prometheus, these attributes should be promoted to metric labels for querying.
        resource_to_telemetry_conversion:
          enabled: true
        retry_on_failure:
          enabled: true
          initial_interval: 10s
          max_interval: 60s
          max_elapsed_time: 10m
    processors:
      # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/processor/resourceprocessor
      resource/cloud:
        attributes:
          - key: cloud.region
            value: "zjusct"
            action: insert
      # https://github.com/open-telemetry/opentelemetry-collector/tree/main/processor/batchprocessor
      batch:
      # https://github.com/open-telemetry/opentelemetry-collector/tree/main/processor/memorylimiterprocessor
      memory_limiter:
        check_interval: 1s
        limit_percentage: 50
        spike_limit_percentage: 30
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          exporters: [debug, prometheusremotewrite]
        traces:
          receivers: [otlp]
          exporters: [debug, otlp_grpc/tempo]
        logs:
          receivers: [otlp]
          exporters: [debug, otlp_http/loki]
