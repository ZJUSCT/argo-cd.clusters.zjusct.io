apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-events-collector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-events-collector
rules:
  - apiGroups:
      - ""
    resources:
      - events
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-events-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-events-collector
subjects:
  - kind: ServiceAccount
    name: k8s-events-collector
    namespace: opentelemetry
