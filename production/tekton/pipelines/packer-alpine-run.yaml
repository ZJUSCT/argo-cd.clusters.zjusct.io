apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: packer-run-alpine-
  namespace: tekton
spec:
  pipelineRef:
    name: packer
  params:
  - name: git-url
    value: "https://git.zju.edu.cn/zjusct/ops/argo-cd.clusters.zjusct.io.git"
  - name: git-revision
    value: "master"
  - name: packer-file
    value: "packer/alpine-simple.pkr.hcl"  # Change this to your Alpine packer file
  - name: packer-image
    value: "harbor.clusters.zjusct.io/library/packer:latest"
  workspaces:
  - name: shared-data
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
