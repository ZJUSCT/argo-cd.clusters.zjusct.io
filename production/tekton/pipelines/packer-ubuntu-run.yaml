apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: packer-ubuntu-run-
  namespace: tekton
spec:
  pipelineRef:
    name: packer-ubuntu
  taskRunTemplate:
    podTemplate:
      securityContext:
        fsGroup: 65532
  workspaces:
    - name: shared-data
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
