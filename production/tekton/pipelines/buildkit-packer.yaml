---
# Pipeline to build Packer image with BuildKit
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: buildkit-packer
spec:
  description: |
    This pipeline builds a Packer image with QEMU support using BuildKit,
    then pushes to Harbor registry.

  workspaces:
  - name: shared-data
    description: Workspace for sharing data between tasks
  - name: docker-credentials
    description: Docker credentials for Harbor registry

  tasks:
  - name: create-dockerfile
    workspaces:
    - name: source
      workspace: shared-data
    taskSpec:
      workspaces:
      - name: source
      steps:
      - name: write-dockerfile
        image: busybox
        script: |
          #!/bin/sh
          set -e

          cat > $(workspaces.source.path)/Dockerfile <<'EOF'
          FROM harbor.clusters.zjusct.io/docker.io/hashicorp/packer:latest

          RUN sed -i 's/dl-cdn.alpinelinux.org/mirrors.zju.edu.cn/g' /etc/apk/repositories
          RUN apk add --no-cache \
              qemu-system-x86_64 \
              qemu-img \
              qemu-ui-gtk \
              ovmf \
              curl \
              bash
          EOF

          echo "Dockerfile created:"
          cat $(workspaces.source.path)/Dockerfile

  - name: build-and-push
    runAfter: ["create-dockerfile"]
    taskRef:
      name: buildkit
    workspaces:
    - name: source
      workspace: shared-data
    - name: dockerconfig
      workspace: docker-credentials
    params:
    - name: IMAGE
      value: "harbor.clusters.zjusct.io/library/packer:latest"
    - name: DOCKERFILE
      value: "./Dockerfile"
    - name: CONTEXT
      value: "."
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: buildkit-packer-run
spec:
  pipelineRef:
    name: buildkit-packer

  params:
  - name: image-reference
    value: harbor.clusters.zjusct.io/library/packer:latest

  workspaces:
  - name: shared-data
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

  - name: docker-credentials
    secret:
      secretName: harbor-credentials
