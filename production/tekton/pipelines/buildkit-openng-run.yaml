apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: buildkit-openng-run-
  namespace: tekton
spec:
  pipelineRef:
    name: buildkit
  taskRunTemplate:
    podTemplate:
      securityContext:
        fsGroup: 65532
  params:
    - name: git-url
      value: "https://github.com/mrhaoxx/OpenNG.git"
    - name: git-revision
      value: "main"
    - name: image-reference
      value: "harbor.clusters.zjusct.io/library/openng:latest"
    - name: dockerfile-path
      value: "Dockerfile"
    - name: context-dir
      value: "."
  workspaces:
    - name: shared-data
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    - name: docker-credentials
      secret:
        secretName: harbor-credentials
