apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: packer-zjusct-full-
  namespace: tekton
spec:
  pipelineRef:
    name: packer
  params:
    - name: git-url
      value: "https://git.zju.edu.cn/zjusct/ops/argo-cd.clusters.zjusct.io.git"
    - name: git-revision
      value: "master"
    - name: build-script
      value: "packer/zjusct-full/packer-build.sh"
    - name: build-image
      value: "harbor.clusters.zjusct.io/library/packer:latest"
    - name: build-output
      value: "packer/zjusct-full/output/zjusct-full.qcow2"
    - name: upload-image
      value: "harbor.clusters.zjusct.io/docker.io/minio/mc:latest"
    - name: upload-s3-prefix
      value: "debian/"
  taskRunTemplate:
    podTemplate:
      securityContext:
        fsGroup: 65532
  workspaces:
    - name: shared-data
      persistentVolumeClaim:
        claimName: packer-data
