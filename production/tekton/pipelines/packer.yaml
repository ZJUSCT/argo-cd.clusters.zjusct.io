apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: packer
spec:
  description: |
    Build one Packer raw target and upload the image plus its per-image
    SHA256 checksum to S3-compatible object storage. Intermediate files live in
    the packer-build-upload Task's emptyDir and are discarded after the TaskRun.
  params:
    - name: git-url
      description: Git repository URL
      type: string
      default: "https://github.com/ZJUSCT/argo-cd.clusters.zjusct.io.git"
    - name: git-revision
      description: Git revision to checkout
      type: string
      default: "master"
    - name: target
      description: Packer target from packer/config.yaml
      type: string
    - name: build-image
      description: Container image used to run Packer and QEMU
      type: string
      default: "harbor.clusters.zjusct.io/ghcr.io/zjusct/argo-cd.clusters.zjusct.io:latest"
    - name: git-image
      description: Container image containing git
      type: string
      default: "harbor.clusters.zjusct.io/docker.io/alpine/git:latest"
    - name: mc-image
      description: MinIO Client container image
      type: string
      default: "harbor.clusters.zjusct.io/docker.io/minio/mc:latest"
    - name: cache-prefix
      description: Prefix for cached upstream base images in the bucket
      type: string
      default: "cache/"
    - name: upload-prefix
      description: Prefix for built raw images in the bucket
      type: string
      default: "built/"
    - name: public-base-url
      description: Public HTTP base URL for the packer-images bucket
      type: string
      default: "https://radosgw.clusters.zjusct.io/packer-images"
  results:
    - name: image-url
      description: Public URL of the uploaded raw image
      value: $(tasks.build.results.image-url)
    - name: checksum-url
      description: Public URL of the uploaded SHA256 checksum file
      value: $(tasks.build.results.checksum-url)
    - name: git-commit
      description: Checked out git commit
      value: $(tasks.build.results.git-commit)
  tasks:
    - name: build
      taskRef:
        name: packer-build-upload
      params:
        - name: git-url
          value: $(params.git-url)
        - name: git-revision
          value: $(params.git-revision)
        - name: target
          value: $(params.target)
        - name: build-image
          value: $(params.build-image)
        - name: git-image
          value: $(params.git-image)
        - name: mc-image
          value: $(params.mc-image)
        - name: cache-prefix
          value: $(params.cache-prefix)
        - name: upload-prefix
          value: $(params.upload-prefix)
        - name: public-base-url
          value: $(params.public-base-url)
