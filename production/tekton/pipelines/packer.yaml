# Pipeline to build ZJUSCT base and full QCOW2 images with Packer,
# then upload them along with SHA256 checksums to S3-compatible object storage.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: packer
spec:
  description: |
    This pipeline clones a git repository, runs a packer build script that
    produces base and full QCOW2 images plus a SHA256SUMS file, and uploads
    all three artifacts to S3-compatible object storage.
  params:
    - name: git-url
      description: Git repository URL
      type: string
    - name: git-revision
      description: Git revision to checkout
      type: string
    - name: build-script
      description: Path to the Packer build script inside the repository
      type: string
    - name: build-image
      description: Container image to run the build script in
      type: string
    - name: upload-image
      description: MinIO Client container image for uploading artifacts
      type: string
    - name: upload-s3-prefix
      description: Destination prefix inside the bucket, with trailing slash
      type: string
  workspaces:
    - name: shared-data
      description: Workspace for sharing data between tasks
    - name: bucket-config
      description: >-
        ConfigMap containing bucket endpoint info
        (BUCKET_HOST, BUCKET_PORT, BUCKET_NAME). Bound via PipelineRun.
    - name: credentials
      description: >-
        Secret containing S3 credentials (AWS_ACCESS_KEY_ID,
        AWS_SECRET_ACCESS_KEY). Bound via PipelineRun.
  tasks:
    - name: fetch-repository
      taskRef:
        resolver: bundles
        params:
          - name: bundle
            value: ghcr.io/tektoncd/catalog/upstream/tasks/git-clone:0.9
          - name: name
            value: git-clone
          - name: kind
            value: Task
      workspaces:
        - name: output
          workspace: shared-data
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
        - name: deleteExisting
          value: "true"
    - name: build
      runAfter: ["fetch-repository"]
      taskRef:
        name: run-script
      workspaces:
        - name: source
          workspace: shared-data
      params:
        - name: IMAGE
          value: $(params.build-image)
        - name: SCRIPT
          value: $(params.build-script)
        - name: SCRIPT_ARGS
          value: $(tasks.fetch-repository.results.commit)
    - name: upload-base
      runAfter: ["build"]
      taskRef:
        name: s3upload
      workspaces:
        - name: source
          workspace: shared-data
        - name: bucket-config
          workspace: bucket-config
        - name: credentials
          workspace: credentials
      params:
        - name: MC_IMAGE
          value: $(params.upload-image)
        - name: FILENAME
          value: "packer/output-base/zjusct-base-$(tasks.fetch-repository.results.commit).qcow2"
        - name: S3_PREFIX
          value: $(params.upload-s3-prefix)
    - name: upload-full
      runAfter: ["build"]
      taskRef:
        name: s3upload
      workspaces:
        - name: source
          workspace: shared-data
        - name: bucket-config
          workspace: bucket-config
        - name: credentials
          workspace: credentials
      params:
        - name: MC_IMAGE
          value: $(params.upload-image)
        - name: FILENAME
          value: "packer/output-full/zjusct-full-$(tasks.fetch-repository.results.commit).qcow2"
        - name: S3_PREFIX
          value: $(params.upload-s3-prefix)
    - name: upload-checksums
      runAfter: ["build"]
      taskRef:
        name: s3upload
      workspaces:
        - name: source
          workspace: shared-data
        - name: bucket-config
          workspace: bucket-config
        - name: credentials
          workspace: credentials
      params:
        - name: MC_IMAGE
          value: $(params.upload-image)
        - name: FILENAME
          value: "packer/SHA256SUMS"
        - name: S3_PREFIX
          value: $(params.upload-s3-prefix)
