---
# Packer Task - Build machine images with Packer
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: packer
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/pipelines.minVersion: "0.17.0"
    tekton.dev/categories: Image Build
    tekton.dev/tags: image-build, packer, qemu
    tekton.dev/platforms: "linux/amd64"
spec:
  description: >-
    This Task builds machine images using HashiCorp Packer.
    It supports QEMU/KVM for building QCOW2, VirtualBox, VMware and other formats.

  params:
  - name: PACKER_FILE
    description: Path to the Packer configuration file relative to workspace root (.pkr.hcl or .json)
    type: string
  - name: PACKER_IMAGE
    description: The Packer container image to use
    default: "harbor.clusters.zjusct.io/library/packer:latest"
    type: string
  - name: PACKER_ARGS
    description: Additional arguments to pass to packer build
    default: ""
    type: string

  workspaces:
  - name: source
    description: Workspace containing the Packer configuration and any required files
  - name: packer-cache
    description: Workspace for Packer plugins cache (shared across steps)
    optional: true

  steps:
  - name: packer-init
    image: $(params.PACKER_IMAGE)
    workingDir: $(workspaces.source.path)
    env:
    - name: PACKER_CONFIG_DIR
      value: $(workspaces.packer-cache.path)
    script: |
      #!/bin/bash
      set -e

      # Extract directory and filename from PACKER_FILE path
      PACKER_DIR=$(dirname "$(params.PACKER_FILE)")
      PACKER_FILENAME=$(basename "$(params.PACKER_FILE)")

      echo "========================================"
      echo "Initializing Packer plugins..."
      echo "========================================"
      echo "Packer file: $(params.PACKER_FILE)"
      echo "Working directory: $(workspaces.source.path)/${PACKER_DIR}"
      echo "Packer filename: ${PACKER_FILENAME}"
      echo "Packer config dir: ${PACKER_CONFIG_DIR}"
      echo "Environment variables:"
      env | grep PACKER || true
      echo ""

      cd "${PACKER_DIR}"
      packer init "${PACKER_FILENAME}"

      echo ""
      echo "Verifying plugin installation:"
      ls -la "${PACKER_CONFIG_DIR}/plugins" || echo "Plugin directory not found at ${PACKER_CONFIG_DIR}/plugins"

      echo ""
      echo "Packer plugins initialized successfully"

  - name: packer-validate
    image: $(params.PACKER_IMAGE)
    workingDir: $(workspaces.source.path)
    env:
    - name: PACKER_CONFIG_DIR
      value: $(workspaces.packer-cache.path)
    script: |
      #!/bin/bash
      set -e

      # Extract directory and filename from PACKER_FILE path
      PACKER_DIR=$(dirname "$(params.PACKER_FILE)")
      PACKER_FILENAME=$(basename "$(params.PACKER_FILE)")

      echo "========================================"
      echo "Validating Packer configuration..."
      echo "========================================"
      echo "Packer config dir: ${PACKER_CONFIG_DIR}"
      echo "Environment variables:"
      env | grep PACKER || true
      echo ""
      echo "Checking for plugins:"
      ls -la "${PACKER_CONFIG_DIR}/plugins" || echo "Plugin directory not found at ${PACKER_CONFIG_DIR}/plugins"
      echo ""

      cd "${PACKER_DIR}"
      packer validate "${PACKER_FILENAME}"

      echo ""
      echo "Packer configuration is valid"

  - name: packer-build
    image: $(params.PACKER_IMAGE)
    workingDir: $(workspaces.source.path)
    env:
    - name: PACKER_CONFIG_DIR
      value: $(workspaces.packer-cache.path)
    securityContext:
      privileged: true
    script: |
      #!/bin/bash
      set -e

      # Extract directory and filename from PACKER_FILE path
      PACKER_DIR=$(dirname "$(params.PACKER_FILE)")
      PACKER_FILENAME=$(basename "$(params.PACKER_FILE)")

      echo "========================================"
      echo "Building image with Packer..."
      echo "========================================"
      echo "Packer file: $(params.PACKER_FILE)"
      echo "Packer directory: ${PACKER_DIR}"
      echo "Packer filename: ${PACKER_FILENAME}"
      echo "Packer config dir: ${PACKER_CONFIG_DIR}"
      echo "Additional args: $(params.PACKER_ARGS)"
      echo ""

      cd "${PACKER_DIR}"
      packer build $(params.PACKER_ARGS) "${PACKER_FILENAME}"

      echo ""
      echo "========================================"
      echo "Build complete!"
      echo "========================================"
      echo ""
      echo "Output directory contents:"
      if [ -d "output" ]; then
        ls -lh output/
        echo ""
        # Display info about qcow2 images
        for img in output/*.qcow2; do
          if [ -f "$img" ]; then
            echo "Image info for $img:"
            qemu-img info "$img"
            echo ""
          fi
        done
      else
        echo "No output directory found"
      fi
