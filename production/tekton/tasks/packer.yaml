---
# Packer Task - Build machine images with Packer
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: packer
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/pipelines.minVersion: "0.17.0"
    tekton.dev/categories: Image Build
    tekton.dev/tags: image-build, packer, qemu
    tekton.dev/platforms: "linux/amd64"
spec:
  description: >-
    This Task builds machine images using HashiCorp Packer.
    It supports QEMU/KVM for building QCOW2, VirtualBox, VMware and other formats.

  params:
  - name: PACKER_FILE
    description: Path to the Packer configuration file (.pkr.hcl or .json)
    type: string
  - name: PACKER_IMAGE
    description: The Packer container image to use
    default: "harbor.clusters.zjusct.io/library/packer:latest"
    type: string
  - name: PACKER_ARGS
    description: Additional arguments to pass to packer build
    default: ""
    type: string
  - name: WORKING_DIR
    description: Working directory for packer (directory containing the packer file)
    default: "."
    type: string

  workspaces:
  - name: source
    description: Workspace containing the Packer configuration and any required files

  steps:
  - name: packer-init
    image: $(params.PACKER_IMAGE)
    workingDir: $(workspaces.source.path)/$(params.WORKING_DIR)
    script: |
      #!/bin/bash
      set -e

      echo "========================================"
      echo "Initializing Packer plugins..."
      echo "========================================"
      echo "Packer file: $(params.PACKER_FILE)"
      echo "Working directory: $(workspaces.source.path)/$(params.WORKING_DIR)"
      echo ""

      packer init $(params.PACKER_FILE)

      echo ""
      echo "Packer plugins initialized successfully"

  - name: packer-validate
    image: $(params.PACKER_IMAGE)
    workingDir: $(workspaces.source.path)/$(params.WORKING_DIR)
    script: |
      #!/bin/bash
      set -e

      echo "========================================"
      echo "Validating Packer configuration..."
      echo "========================================"
      echo ""

      packer validate $(params.PACKER_FILE)

      echo ""
      echo "Packer configuration is valid"

  - name: packer-build
    image: $(params.PACKER_IMAGE)
    workingDir: $(workspaces.source.path)/$(params.WORKING_DIR)
    securityContext:
      privileged: true
    script: |
      #!/bin/bash
      set -e

      echo "========================================"
      echo "Building image with Packer..."
      echo "========================================"
      echo "Packer file: $(params.PACKER_FILE)"
      echo "Additional args: $(params.PACKER_ARGS)"
      echo ""

      packer build $(params.PACKER_ARGS) $(params.PACKER_FILE)

      echo ""
      echo "========================================"
      echo "Build complete!"
      echo "========================================"
      echo ""
      echo "Output directory contents:"
      if [ -d "output" ]; then
        ls -lh output/
        echo ""
        # Display info about qcow2 images
        for img in output/*.qcow2; do
          if [ -f "$img" ]; then
            echo "Image info for $img:"
            qemu-img info "$img"
            echo ""
          fi
        done
      else
        echo "No output directory found"
      fi
