apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: s3upload
  labels:
    app.kubernetes.io/version: "0.3"
  annotations:
    tekton.dev/pipelines.minVersion: "0.17.0"
    tekton.dev/categories: Storage
    tekton.dev/tags: s3,upload
    tekton.dev/platforms: "linux/amd64"
spec:
  description: >-
    Upload a file to S3-compatible object storage using MinIO Client (mc).
    Bucket configuration and credentials are read from workspaces:
    - bucket-config: ConfigMap with BUCKET_HOST, BUCKET_PORT, BUCKET_NAME
    - credentials: Secret with AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  params:
    - name: MC_IMAGE
      description: MinIO Client container image
      type: string
      default: "minio/mc:latest"
    - name: FILENAME
      description: >-
        Path relative to the source workspace of the file to upload.
      type: string
    - name: S3_PREFIX
      description: >-
        Destination prefix inside the bucket, with trailing slash
        (e.g. debian/). Leave empty for bucket root.
      type: string
      default: ""
  workspaces:
    - name: source
      description: Workspace containing the file to upload
    - name: bucket-config
      description: >-
        ConfigMap workspace containing: BUCKET_HOST, BUCKET_PORT, BUCKET_NAME
    - name: credentials
      description: >-
        Secret workspace containing: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  steps:
    - name: upload
      image: $(params.MC_IMAGE)
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -xeu

        SRC="$(params.FILENAME)"
        if [ ! -f "${SRC}" ]; then
          echo "ERROR: File not found: ${SRC}"
          exit 1
        fi
        echo "Found: ${SRC}"
        ls -lh "${SRC}"

        BUCKET_NAME="$(cat "$(workspaces.bucket-config.path)/BUCKET_NAME")"
        BUCKET_HOST="$(cat "$(workspaces.bucket-config.path)/BUCKET_HOST")"
        BUCKET_PORT="$(cat "$(workspaces.bucket-config.path)/BUCKET_PORT")"

        AWS_ACCESS_KEY_ID="$(cat "$(workspaces.credentials.path)/AWS_ACCESS_KEY_ID")"
        AWS_SECRET_ACCESS_KEY="$(cat "$(workspaces.credentials.path)/AWS_SECRET_ACCESS_KEY")"

        mc alias set ceph "http://${BUCKET_HOST}:${BUCKET_PORT}" \
          "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"

        DST="ceph/${BUCKET_NAME}/$(params.S3_PREFIX)$(basename "${SRC}")"
        mc cp "${SRC}" "${DST}"
        echo "Uploaded: s3://${BUCKET_NAME}/$(params.S3_PREFIX)$(basename "${SRC}")"

        mc ls "ceph/${BUCKET_NAME}/$(params.S3_PREFIX)" | tail -n 20
