apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: packer-build-upload
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/pipelines.minVersion: "0.17.0"
    tekton.dev/categories: Image Build
    tekton.dev/tags: packer,qemu,s3
    tekton.dev/platforms: "linux/amd64"
spec:
  description: >-
    Clone the repository, cache the target base image in S3-compatible object
    storage, build a QCOW2 image with Packer, and upload the image with its
    per-image SHA256 checksum.
  params:
    - name: git-url
      description: Git repository URL
      type: string
    - name: git-revision
      description: Git revision to checkout
      type: string
    - name: target
      description: Packer target from packer/config.yaml
      type: string
    - name: build-image
      description: Container image containing packer.py, Packer, QEMU, and Python
      type: string
      default: "harbor.clusters.zjusct.io/ghcr.io/zjusct/argo-cd.clusters.zjusct.io:latest"
    - name: git-image
      description: Container image containing git
      type: string
      default: "harbor.clusters.zjusct.io/docker.io/alpine/git:latest"
    - name: mc-image
      description: MinIO Client container image
      type: string
      default: "harbor.clusters.zjusct.io/docker.io/minio/mc:latest"
    - name: cache-prefix
      description: Prefix for cached upstream base images in the bucket
      type: string
      default: "cache/"
    - name: upload-prefix
      description: Prefix for built QCOW2 images in the bucket
      type: string
      default: "built/"
    - name: public-base-url
      description: Public HTTP base URL for the packer-images bucket
      type: string
      default: "https://radosgw.clusters.zjusct.io/packer-images"
    - name: bucket-config-name
      description: ConfigMap generated by the ObjectBucketClaim
      type: string
      default: "packer-images"
    - name: credentials-secret-name
      description: Secret generated by the ObjectBucketClaim
      type: string
      default: "packer-images"
  results:
    - name: git-commit
      description: Checked out git commit
    - name: image-url
      description: Public URL of the uploaded QCOW2 image
    - name: checksum-url
      description: Public URL of the uploaded SHA256 checksum file
  steps:
    - name: clone
      image: $(params.git-image)
      workingDir: /work
      script: |
        #!/bin/sh
        set -eu

        git init source
        cd source
        git remote add origin "$(params.git-url)"
        git fetch --depth=1 origin "$(params.git-revision)"
        git checkout FETCH_HEAD
        git rev-parse HEAD | tee /work/git-commit
        git rev-parse HEAD > "$(results.git-commit.path)"
      volumeMounts:
        - name: work
          mountPath: /work

    - name: resolve-base-image
      image: $(params.build-image)
      workingDir: /work/source/packer
      script: |
        #!/usr/bin/env bash
        set -xeuo pipefail

        python3 - <<'PY'
        import os
        import sys
        from urllib.parse import urlparse

        import yaml

        target = "$(params.target)"
        with open("config.yaml") as f:
            config = yaml.safe_load(f)

        entry = next((item for item in config if item.get("name") == target), None)
        if entry is None:
            print(f"unknown target: {target}", file=sys.stderr)
            sys.exit(1)

        base_image = entry.get("base_image") or {}
        url = base_image.get("url") or entry.get("iso_url")
        checksum = base_image.get("checksum") or entry.get("iso_checksum")
        if not url or not checksum:
            print(f"target {target} is missing base image URL or checksum", file=sys.stderr)
            sys.exit(1)

        filename = os.path.basename(urlparse(url).path)
        if not filename:
            print(f"cannot derive base image filename from {url}", file=sys.stderr)
            sys.exit(1)

        cache_prefix = "$(params.cache-prefix)".strip("/")
        cache_key = f"{cache_prefix}/{filename}" if cache_prefix else filename
        checksum_key = f"{cache_key}.sha256sum"

        values = {
            "base_url": url,
            "base_checksum": checksum,
            "base_filename": filename,
            "cache_key": cache_key,
            "cache_checksum_key": checksum_key,
        }
        for name, value in values.items():
            with open(f"/work/{name}", "w") as out:
                out.write(value)
        PY
      volumeMounts:
        - name: work
          mountPath: /work

    - name: check-cache
      image: $(params.mc-image)
      workingDir: /work
      script: |
        #!/bin/sh
        set -eu

        BUCKET_NAME="$(cat /bucket-config/BUCKET_NAME)"
        BUCKET_HOST="$(cat /bucket-config/BUCKET_HOST)"
        BUCKET_PORT="$(cat /bucket-config/BUCKET_PORT)"
        AWS_ACCESS_KEY_ID="$(cat /credentials/AWS_ACCESS_KEY_ID)"
        AWS_SECRET_ACCESS_KEY="$(cat /credentials/AWS_SECRET_ACCESS_KEY)"

        mc alias set ceph "http://${BUCKET_HOST}:${BUCKET_PORT}" \
          "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"

        CACHE_KEY="$(cat /work/cache_key)"
        CHECKSUM_KEY="$(cat /work/cache_checksum_key)"

        if mc stat "ceph/${BUCKET_NAME}/${CACHE_KEY}" && mc stat "ceph/${BUCKET_NAME}/${CHECKSUM_KEY}"; then
          mc cat "ceph/${BUCKET_NAME}/${CHECKSUM_KEY}" > /work/base.sha256sum
          read -r BASE_SHA256 _ < /work/base.sha256sum
          printf "%s\n" "${BASE_SHA256}" > /work/base.sha256
          echo hit > /work/cache_status
        else
          echo miss > /work/cache_status
        fi
      volumeMounts:
        - name: work
          mountPath: /work
        - name: bucket-config
          mountPath: /bucket-config
          readOnly: true
        - name: credentials
          mountPath: /credentials
          readOnly: true

    - name: download-base-image
      image: $(params.build-image)
      workingDir: /work
      script: |
        #!/usr/bin/env bash
        set -xeuo pipefail

        if [ "$(cat /work/cache_status)" = "hit" ]; then
          exit 0
        fi

        BASE_URL="$(cat /work/base_url)"
        BASE_CHECKSUM="$(cat /work/base_checksum)"
        BASE_FILENAME="$(cat /work/base_filename)"

        mkdir -p /work/base
        curl -fL --retry 5 --retry-delay 5 -o "/work/base/${BASE_FILENAME}" "${BASE_URL}"

        python3 - <<'PY'
        import hashlib
        import os
        import re
        import subprocess
        import sys
        from urllib.parse import urlparse

        import urllib.request

        filename = open("/work/base_filename").read()
        checksum_spec = open("/work/base_checksum").read()
        image_path = f"/work/base/{filename}"

        def detect_algorithm(value):
            value = value.lower()
            if len(value) == 64:
                return "sha256"
            if len(value) == 128:
                return "sha512"
            raise ValueError(f"unsupported checksum length: {len(value)}")

        def digest(path, algorithm):
            h = hashlib.new(algorithm)
            with open(path, "rb") as f:
                for chunk in iter(lambda: f.read(1024 * 1024), b""):
                    h.update(chunk)
            return h.hexdigest()

        expected_algorithm = None
        expected = None

        if checksum_spec.startswith("file:"):
            checksum_url = checksum_spec.removeprefix("file:")
            with urllib.request.urlopen(checksum_url) as response:
                content = response.read().decode()
            for line in content.splitlines():
                if filename not in line:
                    continue
                match = re.search(r"([A-Fa-f0-9]{64}|[A-Fa-f0-9]{128})", line)
                if match:
                    expected = match.group(1).lower()
                    expected_algorithm = detect_algorithm(expected)
                    break
            if expected is None:
                print(f"checksum for {filename} not found in {checksum_url}", file=sys.stderr)
                sys.exit(1)
        elif ":" in checksum_spec:
            expected_algorithm, expected = checksum_spec.split(":", 1)
            expected_algorithm = expected_algorithm.lower()
            expected = expected.lower()
        else:
            expected = checksum_spec.lower()
            expected_algorithm = detect_algorithm(expected)

        actual = digest(image_path, expected_algorithm)
        if actual != expected:
            print(
                f"{expected_algorithm} mismatch for {filename}: expected {expected}, got {actual}",
                file=sys.stderr,
            )
            sys.exit(1)

        sha256 = digest(image_path, "sha256")
        with open("/work/base.sha256", "w") as f:
            f.write(sha256 + "\n")
        with open("/work/base.sha256sum", "w") as f:
            f.write(f"{sha256}  {filename}\n")
        PY
      volumeMounts:
        - name: work
          mountPath: /work

    - name: upload-base-image
      image: $(params.mc-image)
      workingDir: /work
      script: |
        #!/bin/sh
        set -eu

        if [ "$(cat /work/cache_status)" = "hit" ]; then
          exit 0
        fi

        BUCKET_NAME="$(cat /bucket-config/BUCKET_NAME)"
        BUCKET_HOST="$(cat /bucket-config/BUCKET_HOST)"
        BUCKET_PORT="$(cat /bucket-config/BUCKET_PORT)"
        AWS_ACCESS_KEY_ID="$(cat /credentials/AWS_ACCESS_KEY_ID)"
        AWS_SECRET_ACCESS_KEY="$(cat /credentials/AWS_SECRET_ACCESS_KEY)"

        mc alias set ceph "http://${BUCKET_HOST}:${BUCKET_PORT}" \
          "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"

        BASE_FILENAME="$(cat /work/base_filename)"
        CACHE_KEY="$(cat /work/cache_key)"
        CHECKSUM_KEY="$(cat /work/cache_checksum_key)"

        mc cp "/work/base/${BASE_FILENAME}" "ceph/${BUCKET_NAME}/${CACHE_KEY}"
        mc cp /work/base.sha256sum "ceph/${BUCKET_NAME}/${CHECKSUM_KEY}"
      volumeMounts:
        - name: work
          mountPath: /work
        - name: bucket-config
          mountPath: /bucket-config
          readOnly: true
        - name: credentials
          mountPath: /credentials
          readOnly: true

    - name: build
      image: $(params.build-image)
      workingDir: /work/source/packer
      securityContext:
        privileged: true
        runAsUser: 0
      computeResources:
        requests:
          cpu: "8"
          memory: 16Gi
          ephemeral-storage: 80Gi
      script: |
        #!/usr/bin/env bash
        set -xeuo pipefail

        BUCKET_NAME="$(cat /bucket-config/BUCKET_NAME)"
        BUCKET_HOST="$(cat /bucket-config/BUCKET_HOST)"
        BUCKET_PORT="$(cat /bucket-config/BUCKET_PORT)"
        CACHE_KEY="$(cat /work/cache_key)"
        BASE_SHA256="$(cat /work/base.sha256)"

        ISO_URL="http://${BUCKET_HOST}:${BUCKET_PORT}/${BUCKET_NAME}/${CACHE_KEY}"
        packer init .
        python3 packer.py "$(params.target)" \
          --iso-url "${ISO_URL}" \
          --iso-checksum "sha256:${BASE_SHA256}"

        IMAGE="output/$(params.target)/$(params.target).qcow2"
        test -f "${IMAGE}"
        sha256sum "${IMAGE}" | awk '{print $1}' > "output/$(params.target)/$(params.target).sha256sum"
      volumeMounts:
        - name: work
          mountPath: /work
        - name: bucket-config
          mountPath: /bucket-config
          readOnly: true

    - name: upload-artifacts
      image: $(params.mc-image)
      workingDir: /work/source/packer
      script: |
        #!/bin/sh
        set -eu

        BUCKET_NAME="$(cat /bucket-config/BUCKET_NAME)"
        BUCKET_HOST="$(cat /bucket-config/BUCKET_HOST)"
        BUCKET_PORT="$(cat /bucket-config/BUCKET_PORT)"
        AWS_ACCESS_KEY_ID="$(cat /credentials/AWS_ACCESS_KEY_ID)"
        AWS_SECRET_ACCESS_KEY="$(cat /credentials/AWS_SECRET_ACCESS_KEY)"
        COMMIT="$(cat /work/git-commit)"
        SHORT_COMMIT="$(cut -c1-7 /work/git-commit)"

        mc alias set ceph "http://${BUCKET_HOST}:${BUCKET_PORT}" \
          "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"

        PREFIX="$(params.upload-prefix)"
        PREFIX="${PREFIX%/}/${SHORT_COMMIT}"
        IMAGE="output/$(params.target)/$(params.target).qcow2"
        CHECKSUM="output/$(params.target)/$(params.target).sha256sum"

        mc cp "${IMAGE}" "ceph/${BUCKET_NAME}/${PREFIX}/$(params.target).qcow2"
        mc cp "${CHECKSUM}" "ceph/${BUCKET_NAME}/${PREFIX}/$(params.target).sha256sum"

        IMAGE_URL="$(params.public-base-url)/${PREFIX}/$(params.target).qcow2"
        CHECKSUM_URL="$(params.public-base-url)/${PREFIX}/$(params.target).sha256sum"

        printf "%s" "${IMAGE_URL}" > "$(results.image-url.path)"
        printf "%s" "${CHECKSUM_URL}" > "$(results.checksum-url.path)"
        echo "Uploaded image: ${IMAGE_URL}"
        echo "Uploaded checksum: ${CHECKSUM_URL}"
      volumeMounts:
        - name: work
          mountPath: /work
        - name: bucket-config
          mountPath: /bucket-config
          readOnly: true
        - name: credentials
          mountPath: /credentials
          readOnly: true

  volumes:
    - name: work
      emptyDir:
        sizeLimit: 120Gi
    - name: bucket-config
      configMap:
        name: $(params.bucket-config-name)
    - name: credentials
      secret:
        secretName: $(params.credentials-secret-name)
