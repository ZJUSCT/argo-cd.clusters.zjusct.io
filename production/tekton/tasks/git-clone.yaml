---
# Git Clone Task - simplified version
# In production, use: tkn hub install task git-clone
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  labels:
    app.kubernetes.io/version: "0.9"
  annotations:
    tekton.dev/pipelines.minVersion: "0.21.0"
    tekton.dev/categories: Git
    tekton.dev/tags: git
    tekton.dev/platforms: "linux/amd64,linux/s390x,linux/ppc64le,linux/arm64"
spec:
  description: >-
    This Task clones a Git repository to a workspace.

  params:
  - name: url
    description: Repository URL to clone from.
    type: string
  - name: revision
    description: Revision to checkout (branch, tag, sha, ref, etc.)
    type: string
    default: "main"
  - name: subdirectory
    description: Subdirectory inside the workspace to clone the repo into
    type: string
    default: ""
  - name: deleteExisting
    description: Clean out the contents of the destination directory if it exists
    type: string
    default: "true"

  workspaces:
  - name: output
    description: The git repo will be cloned onto this workspace

  results:
  - name: commit
    description: The commit SHA that was fetched by this Task
  - name: url
    description: The URL that was fetched by this Task

  steps:
  - name: clone
    image: gcr.io/tekton-releases/github.com/tektoncd/pipeline/cmd/git-init:v0.40.2
    env:
    - name: HOME
      value: /home/git
    - name: PARAM_URL
      value: $(params.url)
    - name: PARAM_REVISION
      value: $(params.revision)
    - name: PARAM_SUBDIRECTORY
      value: $(params.subdirectory)
    - name: PARAM_DELETE_EXISTING
      value: $(params.deleteExisting)
    - name: WORKSPACE_OUTPUT_PATH
      value: $(workspaces.output.path)
    script: |
      #!/usr/bin/env sh
      set -eu

      if [ "${PARAM_DELETE_EXISTING}" = "true" ] && [ -d "${WORKSPACE_OUTPUT_PATH}/${PARAM_SUBDIRECTORY}" ]; then
        echo "Cleaning out existing contents of ${WORKSPACE_OUTPUT_PATH}/${PARAM_SUBDIRECTORY}"
        rm -rf "${WORKSPACE_OUTPUT_PATH}/${PARAM_SUBDIRECTORY}"
      fi

      mkdir -p "${WORKSPACE_OUTPUT_PATH}/${PARAM_SUBDIRECTORY}"
      cd "${WORKSPACE_OUTPUT_PATH}/${PARAM_SUBDIRECTORY}"

      /ko-app/git-init \
        -url="${PARAM_URL}" \
        -revision="${PARAM_REVISION}" \
        -path="${WORKSPACE_OUTPUT_PATH}/${PARAM_SUBDIRECTORY}"

      RESULT_SHA="$(git rev-parse HEAD)"
      echo -n "${RESULT_SHA}" > $(results.commit.path)
      echo -n "${PARAM_URL}" > $(results.url.path)
