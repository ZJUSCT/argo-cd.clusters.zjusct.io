# https://cert-manager.io/docs/tutorials/acme/nginx-ingress
# https://cert-manager.io/docs/configuration/acme/dns01/cloudflare/
# cloudflare DNS-01 validate, letsencrypt certificate
# DNS-01 solver is scoped to zjusct.io domains via dnsZones selector;
# HTTP-01 solver acts as fallback for non-Cloudflare domains.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: mail@zjusct.io
    profile: tlsserver
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - dns01:
        cloudflare:
          apiTokenSecretRef:
            name: cloudflare-api-token-secret
            key: api-token
      selector:
        dnsZones:
        - zjusct.io
    - http01:
        gatewayHTTPRoute:
          parentRefs:
            - name: envoy-gateway
              namespace: envoy-gateway
              kind: Gateway
