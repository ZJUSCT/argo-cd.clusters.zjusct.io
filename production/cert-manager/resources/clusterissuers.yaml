# https://cert-manager.io/docs/tutorials/acme/nginx-ingress
# https://cert-manager.io/docs/configuration/acme/dns01/cloudflare/
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: mail@zjusct.io
    profile: tlsserver
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - dns01:
        cloudflare:
          apiTokenSecretRef:
            name: cloudflare-api-token-secret
            key: api-token
---
# cloudflare DNS-01 validate, letsencrypt certificate
# DNS-01 solver is scoped to zjusct.io domains via dnsZones selector;
# HTTP-01 solver acts as fallback for non-Cloudflare domains.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: mail@zjusct.io
    profile: tlsserver
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - dns01:
        cloudflare:
          apiTokenSecretRef:
            name: cloudflare-api-token-secret
            key: api-token
      selector:
        dnsZones:
        - zjusct.io
    - http01:
        gatewayHTTPRoute:
          parentRefs:
            - name: envoy-gateway
              namespace: envoy-gateway
              kind: Gateway
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: clusters-zjusct-io-cert
  namespace: cert-manager
spec:
  secretName: clusters-zjusct-io-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - "clusters.zjusct.io"
  - "*.clusters.zjusct.io"
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "openng"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "openng"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: s-zjusct-io-cert
  namespace: cert-manager
spec:
  secretName: s-zjusct-io-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - "s.zjusct.io"
  - "*.s.zjusct.io"
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "openng"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "openng"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: clusters-zju-edu-cn-cert
  namespace: cert-manager
spec:
  secretName: clusters-zju-edu-cn-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - "clusters.zju.edu.cn"
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "openng"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "openng"
